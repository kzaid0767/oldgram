<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <title>Oldgram</title>
</head>
<body>
    <div class="container">
        <header>
            <img class="oldagram-logo" src="images/logo.png" alt="Oldgram logo">
            <img class="avatar" src="images/me-avatar.jpg" alt="picture of kassim">
        </header>
        <section class="top-section">
            <img class="avatar" src="images/avatar-vangogh.jpg" alt="avatar of van Gogh">
            <div class="name">
                <h1 class="font700">Vincent van Gogh</h1>
                <p>Zudert, Netherlands</p>
            </div>
        </section>
        <section class="middle-section">
            <img class="image-post" src="images/post-vangogh.jpg" alt="selfie of van Gogh">
        </section>
        <section class="bottom-section">
            <div class="icons-container">
                <img class="icons" src="images/icon-heart.png" alt="hear icon">
                <img class="icons" src="images/icon-comment.png" alt="comment icon">
                <img class="icons" src="images/icon-dm.png" alt="dm icon">
            </div>
            <p class="likes font700">21,7987 likes</p>
            <p class="comment"><name class="font700">vince1853</name> just some tom </p>
        </section>
    </div>
    <script src="index.js"></script>
</body>
</html>
